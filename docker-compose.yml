x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-prod}
  POSTGRES_URL: ${POSTGRES_URL:-postgresql+psycopg://postgres:changeme@postgres:5432/app}
  KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
  ELASTIC_URL: ${ELASTIC_URL:-http://elasticsearch:9200}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  FILES_ROOT: ${FILES_ROOT:-/data}
  JWT_SECRET: ${JWT_SECRET:-changeme}
  LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000}
  OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
  AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
  LDAP_URL: ${LDAP_URL:-ldap://domain-controller:389}
  LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=company,DC=local}
  LDAP_BIND_USER: ${LDAP_BIND_USER:-cn=svc-search,DC=company,DC=local}
  LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-changeme}
  FEATURE_DOCUMENT_COMMENTS: ${FEATURE_DOCUMENT_COMMENTS:-true}
  FEATURE_RAG_QA: ${FEATURE_RAG_QA:-true}
  FEATURE_SUMMARIZATION: ${FEATURE_SUMMARIZATION:-true}
  FEATURE_ENTITY_EXTRACTION: ${FEATURE_ENTITY_EXTRACTION:-true}
  FEATURE_ANNOTATIONS: ${FEATURE_ANNOTATIONS:-true}
  FEATURE_SUBSCRIPTIONS: ${FEATURE_SUBSCRIPTIONS:-true}
  FEATURE_EXPERTISE_MAP: ${FEATURE_EXPERTISE_MAP:-true}
  FEATURE_RELATED_DOCS: ${FEATURE_RELATED_DOCS:-true}
  FEATURE_AUTO_TAGGING: ${FEATURE_AUTO_TAGGING:-true}
  AUTO_ENRICH_THRESHOLD: ${AUTO_ENRICH_THRESHOLD:-5}
  INGEST_MODE: ${INGEST_MODE:-hybrid}

services:
  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - files_data:/data

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment: *app-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      libretranslate:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
    volumes:
      - files_data:/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: redpandadata/redpanda:v24.1.9
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - kafka_data:/var/lib/redpanda/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - qdrant_data:/qdrant/storage

  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    ports:
      - "${LIBRETRANSLATE_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/languages >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - libretranslate_data:/home/libretranslate/.local

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - ollama_data:/root/.ollama

volumes:
  files_data:
  postgres_data:
  kafka_data:
  elasticsearch_data:
  qdrant_data:
  libretranslate_data:
  ollama_data:
