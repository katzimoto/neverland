x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-prod}
  POSTGRES_URL: ${POSTGRES_URL:-postgresql+psycopg://postgres:changeme@postgres:5432/app}
  KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
  ELASTIC_URL: ${ELASTIC_URL:-http://elasticsearch:9200}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  FILES_ROOT: ${FILES_ROOT:-/data}
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
  LIBRETRANSLATE_URL: ${LIBRETRANSLATE_URL:-http://libretranslate:5000}
  SUPPORTED_TRANSLATION_SOURCE_LANGUAGES: ${SUPPORTED_TRANSLATION_SOURCE_LANGUAGES:-en,he,zh,ko,th,ar,fr,ru,es}
  SUPPORTED_TRANSLATION_TARGET_LANGUAGES: ${SUPPORTED_TRANSLATION_TARGET_LANGUAGES:-en,he,zh,ko,th,ar,fr,ru,es}
  OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
  AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
  LDAP_URL: ${LDAP_URL:-ldap://domain-controller:389}
  LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=company,DC=local}
  LDAP_BIND_USER: ${LDAP_BIND_USER:-cn=svc-search,DC=company,DC=local}
  LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-changeme}
  FEATURE_DOCUMENT_COMMENTS: ${FEATURE_DOCUMENT_COMMENTS:-true}
  FEATURE_RAG_QA: ${FEATURE_RAG_QA:-true}
  FEATURE_SUMMARIZATION: ${FEATURE_SUMMARIZATION:-true}
  FEATURE_ENTITY_EXTRACTION: ${FEATURE_ENTITY_EXTRACTION:-true}
  FEATURE_ANNOTATIONS: ${FEATURE_ANNOTATIONS:-true}
  FEATURE_SUBSCRIPTIONS: ${FEATURE_SUBSCRIPTIONS:-true}
  FEATURE_EXPERTISE_MAP: ${FEATURE_EXPERTISE_MAP:-true}
  FEATURE_RELATED_DOCS: ${FEATURE_RELATED_DOCS:-true}
  FEATURE_AUTO_TAGGING: ${FEATURE_AUTO_TAGGING:-true}
  AUTO_ENRICH_THRESHOLD: ${AUTO_ENRICH_THRESHOLD:-5}
  INGEST_MODE: ${INGEST_MODE:-hybrid}
  MEILISEARCH_URL: ${MEILISEARCH_URL:-http://meilisearch:7700}
  MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-}
  FEATURE_MEILISEARCH_SEARCH: ${FEATURE_MEILISEARCH_SEARCH:-false}
  FEATURE_MEILISEARCH_SHADOW_INDEX: ${FEATURE_MEILISEARCH_SHADOW_INDEX:-false}

services:
  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - files_data:/data

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment: *app-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).close()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro

  pipeline-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment: *app-environment
    command: python -m services.pipeline.runner
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    logging:
      driver: json-file
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro

  vector-worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    environment: *app-environment
    command: python -m services.pipeline.vector_worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    logging:
      driver: json-file
    volumes:
      - files_data:/data
      - ./data:/data/mounted:ro

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid && kill -0 $$(cat /var/run/nginx.pid)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: redpandadata/redpanda:v24.1.9
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - kafka_data:/var/lib/redpanda/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9200'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  meilisearch:
    image: getmeili/meilisearch:v1.9
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-}
      MEILI_ENV: ${MEILISEARCH_ENV:-production}
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/7700'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - meilisearch_data:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - qdrant_data:/qdrant/storage

  libretranslate:
    build:
      context: .
      dockerfile: docker/libretranslate.Dockerfile
    image: tomorrowland/libretranslate:airgap
    restart: unless-stopped
    environment:
      LT_UPDATE_PACKAGES: "false"
      LT_UPDATE_MODELS: "false"
      LT_LOAD_ONLY: ${LT_LOAD_ONLY:-en,he,zh,ko,th,ar,fr,ru,es}
      ARGOS_CHUNK_TYPE: ${ARGOS_CHUNK_TYPE:-MINISBD}
    ports:
      - "${LIBRETRANSLATE_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=5).close()\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    logging:
      driver: json-file
    volumes:
      - libretranslate_data:/home/libretranslate/.local

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - ollama_data:/root/.ollama

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles:
      - monitoring
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    logging:
      driver: json-file

  grafana:
    image: grafana/grafana:11.1.4
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging:
      driver: json-file

volumes:
  files_data:
    name: ${TOMORROWLAND_FILES_VOLUME:-tomorrowland_files_data}
  postgres_data:
    name: ${TOMORROWLAND_POSTGRES_VOLUME:-tomorrowland_postgres_data}
  kafka_data:
    name: ${TOMORROWLAND_KAFKA_VOLUME:-tomorrowland_kafka_data}
  elasticsearch_data:
    name: ${TOMORROWLAND_ELASTICSEARCH_VOLUME:-tomorrowland_elasticsearch_data}
  qdrant_data:
    name: ${TOMORROWLAND_QDRANT_VOLUME:-tomorrowland_qdrant_data}
  meilisearch_data:
    name: ${TOMORROWLAND_MEILISEARCH_VOLUME:-tomorrowland_meilisearch_data}
  libretranslate_data:
    name: ${TOMORROWLAND_LIBRETRANSLATE_VOLUME:-tomorrowland_libretranslate_data}
  ollama_data:
    name: ${TOMORROWLAND_OLLAMA_VOLUME:-tomorrowland_ollama_data}
  prometheus_data:
    name: ${TOMORROWLAND_PROMETHEUS_VOLUME:-tomorrowland_prometheus_data}
  grafana_data:
    name: ${TOMORROWLAND_GRAFANA_VOLUME:-tomorrowland_grafana_data}
