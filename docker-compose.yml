services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: redpandadata/redpanda:v24.1.9
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - kafka_data:/var/lib/redpanda/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  qdrant:
    image: qdrant/qdrant:v1.10.1
    restart: unless-stopped
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - qdrant_data:/qdrant/storage

  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/languages >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - libretranslate_data:/home/libretranslate/.local

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  kafka_data:
  elasticsearch_data:
  qdrant_data:
  libretranslate_data:
  ollama_data:
