<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="Tomorrowland logo">
  <title>Tomorrowland logo</title>
  <defs>
    <filter id="neon" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark cyberpunk background -->
  <rect width="40" height="40" rx="5" fill="#060c1a"/>

  <!-- Subtle grid lines -->
  <g stroke="#0d2a44" stroke-width="0.4">
    <line x1="0" y1="10" x2="40" y2="10"/>
    <line x1="0" y1="20" x2="40" y2="20"/>
    <line x1="0" y1="30" x2="40" y2="30"/>
    <line x1="10" y1="0" x2="10" y2="40"/>
    <line x1="20" y1="0" x2="20" y2="40"/>
    <line x1="30" y1="0" x2="30" y2="40"/>
  </g>

  <!-- Scanlines overlay -->
  <g fill="#00e5ff" opacity="0.04">
    <rect x="0" y="2" width="40" height="1"/>
    <rect x="0" y="6" width="40" height="1"/>
    <rect x="0" y="10" width="40" height="1"/>
    <rect x="0" y="14" width="40" height="1"/>
    <rect x="0" y="18" width="40" height="1"/>
    <rect x="0" y="22" width="40" height="1"/>
    <rect x="0" y="26" width="40" height="1"/>
    <rect x="0" y="30" width="40" height="1"/>
    <rect x="0" y="34" width="40" height="1"/>
    <rect x="0" y="38" width="40" height="1"/>
  </g>

  <!-- Bicycle — neon cyan with glow -->
  <g filter="url(#neon)" stroke="#00e5ff" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="10" cy="27" r="7.5" stroke-width="1.8"/>
    <!-- Front wheel -->
    <circle cx="30" cy="27" r="7.5" stroke-width="1.8"/>

    <!-- Spokes: rear wheel (6, every 60°) -->
    <g stroke-width="0.75" opacity="0.65">
      <line x1="10" y1="27" x2="17.5" y2="27"/>
      <line x1="10" y1="27" x2="2.5" y2="27"/>
      <line x1="10" y1="27" x2="13.75" y2="20.5"/>
      <line x1="10" y1="27" x2="6.25" y2="20.5"/>
      <line x1="10" y1="27" x2="6.25" y2="33.5"/>
      <line x1="10" y1="27" x2="13.75" y2="33.5"/>
    </g>

    <!-- Spokes: front wheel (6, every 60°) -->
    <g stroke-width="0.75" opacity="0.65">
      <line x1="30" y1="27" x2="37.5" y2="27"/>
      <line x1="30" y1="27" x2="22.5" y2="27"/>
      <line x1="30" y1="27" x2="33.75" y2="20.5"/>
      <line x1="30" y1="27" x2="26.25" y2="20.5"/>
      <line x1="30" y1="27" x2="26.25" y2="33.5"/>
      <line x1="30" y1="27" x2="33.75" y2="33.5"/>
    </g>

    <!-- Hub dots -->
    <circle cx="10" cy="27" r="1.8" fill="#00e5ff" stroke="none"/>
    <circle cx="30" cy="27" r="1.8" fill="#00e5ff" stroke="none"/>

    <!-- Diamond frame -->
    <!-- Seat tube: seat cluster → BB -->
    <line x1="16" y1="15" x2="20" y2="27" stroke-width="2"/>
    <!-- Top tube: seat cluster → head tube (horizontal) -->
    <line x1="16" y1="15" x2="26" y2="15" stroke-width="2"/>
    <!-- Down tube: head tube → BB -->
    <line x1="26" y1="15" x2="20" y2="27" stroke-width="1.8"/>
    <!-- Seat stays: seat cluster → rear hub -->
    <line x1="16" y1="15" x2="10" y2="27" stroke-width="1.5"/>
    <!-- Chain stays: rear hub → BB (horizontal) -->
    <line x1="10" y1="27" x2="20" y2="27" stroke-width="1.5"/>
    <!-- Head tube: short angled segment -->
    <line x1="26" y1="13" x2="27" y2="20" stroke-width="2.5"/>
    <!-- Fork: head tube → front hub -->
    <line x1="27" y1="20" x2="30" y2="27" stroke-width="2"/>

    <!-- Handlebar: stem and bar -->
    <line x1="26" y1="13" x2="27" y2="9" stroke-width="1.8"/>
    <line x1="24" y1="9" x2="31" y2="9" stroke-width="2"/>

    <!-- Saddle (horizontal bar at seat post top) -->
    <line x1="13" y1="14" x2="20" y2="14" stroke-width="2.5"/>

    <!-- Chain ring at BB (dashed circle) -->
    <circle cx="20" cy="27" r="3.5" stroke-width="1" opacity="0.55" stroke-dasharray="2,1.5"/>

    <!-- Pedal crank indicator -->
    <line x1="17" y1="29" x2="23" y2="25" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00e5ff" stroke-width="1.2" fill="none" opacity="0.45" filter="url(#neon-soft)">
    <polyline points="1.5,5 1.5,1.5 5,1.5"/>
    <polyline points="35,1.5 38.5,1.5 38.5,5"/>
    <polyline points="38.5,35 38.5,38.5 35,38.5"/>
    <polyline points="5,38.5 1.5,38.5 1.5,35"/>
  </g>
</svg>
