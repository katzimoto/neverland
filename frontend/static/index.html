<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neverland</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 32px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #536176;
        font-size: 1rem;
        line-height: 1.6;
      }

      code {
        border-radius: 4px;
        background: #e8ecf2;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Neverland runtime is ready</h1>
      <p>
        This Phase 08a placeholder verifies that the frontend container can run
        separately from the API. The full React application lands in Phase 08b.
        API requests can be proxied through <code>/api/</code>.
      </p>
    </main>
  </body>
</html>
