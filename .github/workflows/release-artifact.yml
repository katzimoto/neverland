name: Release Artifact

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to package (defaults to ref name or short SHA)"
        required: false
        type: string
      attach_to_release:
        description: "Attach archive and checksums to a GitHub Release"
        required: false
        default: false
        type: boolean
      build_ollama_bundle:
        description: "Build and upload the default Ollama model bundle"
        required: false
        default: false
        type: boolean
      ollama_model:
        description: "Ollama model to bundle when build_ollama_bundle is enabled"
        required: false
        default: "mistral"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-artifact-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-artifact:
    name: Build air-gapped release artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${GITHUB_SHA::12}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${version//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build release archive with split offline image assets
        run: SPLIT_IMAGE_BUNDLE=1 IMAGE_PART_SIZE=1900m bash scripts/build-release-artifact.sh "${{ steps.version.outputs.version }}"

      - name: Validate packaged artifact metadata and split image bundle
        run: bash scripts/validate-airgap-artifact.sh --load-images "dist/tomorrowland-release-${{ steps.version.outputs.safe_version }}"

      - name: Prove air-gapped compose image references are bundled
        run: |
          set -euo pipefail
          release_dir="dist/tomorrowland-release-${{ steps.version.outputs.safe_version }}"
          docker compose --env-file "$release_dir/.env.airgap.example" \
            -f "$release_dir/docker-compose.airgap.yml" config --images | tee "$release_dir/compose-images.txt"
          if grep -Eq '^[[:space:]]+build:' "$release_dir/docker-compose.airgap.yml"; then
            echo "Forbidden build step found in docker-compose.airgap.yml" >&2
            exit 1
          fi
          found_parts=0
          for part in dist/tomorrowland-images-${{ steps.version.outputs.safe_version }}.tar.part-*; do
            [ -f "$part" ] || continue
            found_parts=1
            size_bytes="$(wc -c < "$part")"
            max_bytes=$((2 * 1024 * 1024 * 1024))
            if [ "$size_bytes" -ge "$max_bytes" ]; then
              echo "Split image part is too large for GitHub Release assets: $part ($size_bytes bytes)" >&2
              exit 1
            fi
          done
          if [ "$found_parts" -ne 1 ]; then
            echo "No split image parts found" >&2
            exit 1
          fi

      - name: Upload release archive artifact
        uses: actions/upload-artifact@v6
        with:
          name: tomorrowland-release-${{ steps.version.outputs.safe_version }}
          path: |
            dist/tomorrowland-release-${{ steps.version.outputs.safe_version }}.tar.gz
            dist/tomorrowland-release-${{ steps.version.outputs.safe_version }}.tar.gz.sha256
            dist/tomorrowland-images-${{ steps.version.outputs.safe_version }}.tar.part-*
            dist/tomorrowland-images-${{ steps.version.outputs.safe_version }}.tar.parts.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attach archive to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.attach_to_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/tomorrowland-release-${{ steps.version.outputs.safe_version }}.tar.gz
            dist/tomorrowland-release-${{ steps.version.outputs.safe_version }}.tar.gz.sha256
            dist/tomorrowland-images-${{ steps.version.outputs.safe_version }}.tar.part-*
            dist/tomorrowland-images-${{ steps.version.outputs.safe_version }}.tar.parts.sha256


  build-ollama-model-bundle:
    name: Build default Ollama model bundle
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.build_ollama_bundle
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${GITHUB_SHA::12}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${version//\//-}" >> "$GITHUB_OUTPUT"

      - name: Resolve Ollama model
        id: model
        shell: bash
        run: |
          set -euo pipefail
          model="${{ inputs.ollama_model }}"
          if [[ -z "$model" ]]; then
            model="mistral"
          fi
          slug="$(printf '%s' "$model" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
          echo "model=${model}" >> "$GITHUB_OUTPUT"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Build Ollama model bundle
        env:
          OLLAMA_MODEL: ${{ steps.model.outputs.model }}
        run: bash scripts/build-ollama-model-bundle.sh "${{ steps.version.outputs.version }}"

      - name: Inspect model bundle contents
        run: tar tzf "dist/tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}.tar.gz" | head -100

      - name: Verify model bundle checksum
        run: sha256sum -c "dist/tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}.tar.gz.sha256"

      - name: Upload Ollama model bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}
          path: |
            dist/tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}.tar.gz
            dist/tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attach Ollama model bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.attach_to_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}.tar.gz
            dist/tomorrowland-ollama-bundle-${{ steps.model.outputs.slug }}-${{ steps.version.outputs.safe_version }}.tar.gz.sha256
