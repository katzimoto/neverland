name: Auto Claude Review for Codex PRs

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  request-claude-review:
    if: |
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.title, '[skip claude]') &&
      (
        startsWith(github.event.pull_request.head.ref, 'codex/') ||
        startsWith(github.event.pull_request.head.ref, 'mission/') ||
        github.event.pull_request.user.login == 'codex' ||
        github.event.pull_request.user.login == 'openai-codex' ||
        contains(join(github.event.pull_request.labels.*.name, ','), 'agent:codex')
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Ensure labels exist
        run: |
          gh label create "agent:codex" --repo "$REPO" --description "Owned or generated by Codex" --color "1d76db" || true
          gh label create "agent:claude" --repo "$REPO" --description "Needs Claude planning or review" --color "5319e7" || true
          gh label create "status:review" --repo "$REPO" --description "Ready for review" --color "fbca04" || true
          gh label create "status:implementation" --repo "$REPO" --description "Implementation in progress" --color "0e8a16" || true
          gh label create "status:blocked" --repo "$REPO" --description "Blocked by another issue, PR, or human decision" --color "d93f0b" || true
          gh label create "status:needs-human" --repo "$REPO" --description "Needs human decision before continuing" --color "b60205" || true

      - name: Validate and set PR status labels
        run: |
          existing_labels=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')

          if echo "$existing_labels" | grep -qx "status:blocked"; then
            echo "PR is blocked; not requesting Claude review."
            exit 0
          fi

          if echo "$existing_labels" | grep -qx "status:needs-human"; then
            echo "PR needs human decision; not requesting Claude review."
            exit 0
          fi

          for label in status:planning status:implementation status:blocked status:needs-human; do
            if echo "$existing_labels" | grep -qx "$label"; then
              gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label "$label"
            fi
          done

          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "agent:codex" --add-label "agent:claude" --add-label "status:review"

      - name: Request Claude review once per PR
        run: |
          if gh pr view "$PR_NUMBER" --repo "$REPO" --json comments --jq '.comments[].body' | grep -q "<!-- auto-claude-review-request -->"; then
            echo "Claude review already requested for this PR."
            exit 0
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "<!-- auto-claude-review-request -->
@claude review this Codex PR.

Read:
1. AGENTS.md
2. CLAUDE.md
3. docs/agents/token-efficiency.md
4. The linked issue
5. The PR diff
6. Changed files only
7. The referenced plan only if acceptance criteria are unclear

Do not implement fixes unless explicitly asked.

Review focus:
- Does the PR satisfy the linked issue acceptance criteria?
- Does it respect the Context Budget?
- Does it stay within Allowed Changes?
- Did it touch any Forbidden Changes?
- Architecture consistency
- API compatibility
- Security and permissions
- Edge cases
- Migration/schema risk
- Test coverage
- Whether the handoff is complete

Respond with:

## Claude Review

### Verdict
Approve / Request changes / Comment only

### Blockers
- ...

### Warnings
- ...

### Suggestions
- ...

### Test / Coverage Notes
- ...

### Context Efficiency Notes
- ..."
