name: Security

on:
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  security-checks:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Check for obvious committed secrets
        run: |
          set -euo pipefail
          if grep -RInE '(JWT_SECRET|PASSWORD|API_TOKEN|PRIVATE_KEY)=([^c]|c[^h]|ch[^a]|cha[^n]|chan[^g]|chang[^e]|change[^m]|changem[^e])' \
            --exclude-dir=.git \
            --exclude=.env.example \
            .; then
            echo "Potential committed secret found."
            exit 1
          fi

      - name: Python dependency audit when configured
        run: |
          set -euo pipefail
          if test -f pyproject.toml || test -f requirements.txt; then
            python -m pip install --upgrade pip pip-audit
            pip-audit
          else
            echo "No Python dependency manifest found; skipping pip-audit."
          fi

      - name: Node dependency audit when configured
        run: |
          set -euo pipefail
          if test -f package-lock.json; then
            npm audit --audit-level=moderate
          else
            echo "No package-lock.json found; skipping npm audit."
          fi
