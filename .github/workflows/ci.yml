name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - developer/**
      - docs/**
      - feature/**
      - fix/**

permissions:
  contents: read

jobs:
  checks:
    name: Lint, Test & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check required bootstrap files
        run: |
          set -euo pipefail
          test -f docs/logical-spec.md
          test -f docs/review/spec-gaps.md
          test -f docs/implementation/README.md
          test -f .github/pull_request_template.md

      - name: Check markdown structure
        run: |
          set -euo pipefail
          find . -name '*.md' \
            -not -path './.git/*' \
            -not -path './.venv/*' \
            -not -path './node_modules/*' \
            -not -path './dist/*' \
            -print0 |
            xargs -0 -I {} sh -c 'first="$(head -n 1 "$1")"; test "${first#\#}" != "$first" || test "$first" = "---"' sh {}

      - name: Lint & Format
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .

      - name: Type check
        run: |
          set -euo pipefail
          mypy src --strict

      - name: Test with coverage
        run: |
          set -euo pipefail
          pytest

      - name: Docker Compose check
        run: |
          set -euo pipefail
          if command -v docker >/dev/null 2>&1 && test -f docker-compose.yml; then
            docker compose config
          else
            echo "Docker not available; skipping compose check."
          fi


      - name: Dependency audit
        run: |
          set -euo pipefail
          python -m pip install pip-audit
          pip-audit
