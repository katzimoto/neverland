name: Codex Developer

on:
  workflow_dispatch:
    inputs:
      spec_path:
        description: "Path to the phase plan or feature spec"
        required: true
        default: "docs/implementation/phase-00-repo-bootstrap.md"
  issues:
    types:
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  developer:
    name: Developer agent
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'codex-dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "$GITHUB_REF"
          git checkout --force FETCH_HEAD

      - name: Show agent contract
        run: |
          set -euo pipefail
          test -f agents.md
          test -f skill.md
          sed -n '1,80p' agents.md

      - name: Run Codex Developer when available
        id: codex
        run: |
          set -euo pipefail
          SPEC_PATH="${{ inputs.spec_path || github.event.issue.html_url }}"
          if command -v codex >/dev/null 2>&1; then
            echo "has_codex=true" >> "$GITHUB_OUTPUT"
            codex run --agent developer --skills skill.md "$SPEC_PATH"
            if git diff --quiet; then
              echo "Developer agent produced no changes."
              exit 1
            fi
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_codex=false" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "codex CLI is not installed on this runner."
            echo "Install/configure codex before enabling automated implementation."
          fi

      - name: Open pull request for generated changes
        if: steps.codex.outputs.has_codex == 'true' && steps.codex.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SPEC_PATH: ${{ inputs.spec_path || github.event.issue.html_url }}
        run: |
          set -euo pipefail
          BRANCH="developer/codex-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add -A
          git commit -m "chore: apply codex developer changes"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: apply Codex Developer changes" \
            --body "Generated by the Codex Developer workflow.

          Source: \`${SPEC_PATH}\`

          This PR must still pass normal review before merge."
