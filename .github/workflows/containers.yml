name: Container CI

on:
  pull_request:
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - "src/**"
      - "migrations/**"
      - "frontend/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/containers.yml"
  push:
    branches:
      - main
      - "developer/**"
      - "feature/**"
      - "fix/**"
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - "src/**"
      - "migrations/**"
      - "frontend/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/containers.yml"

permissions:
  contents: read

concurrency:
  group: container-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    name: Compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

  image-builds:
    name: Docker image builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            dockerfile: docker/backend.Dockerfile
          - name: frontend
            dockerfile: docker/frontend.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: tomorrowland-${{ matrix.image.name }}:ci
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  compose-up:
    name: Docker Compose up smoke test
    runs-on: ubuntu-latest
    needs: compose
    timeout-minutes: 35
    env:
      COMPOSE_PROJECT_NAME: tomorrowland_ci_${{ github.run_id }}_${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Build and start Docker Compose stack
        run: docker compose up --build --detach --remove-orphans

      - name: Wait for Compose services
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 900))
          services="postgres kafka elasticsearch qdrant libretranslate ollama api frontend"

          while true; do
            not_ready=()

            for service in $services; do
              container_id="$(docker compose ps -q "$service")"
              if [ -z "$container_id" ]; then
                not_ready+=("$service:no-container")
                continue
              fi

              status="$(docker inspect --format='{{.State.Status}}' "$container_id")"
              health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"

              if [ "$status" != "running" ]; then
                not_ready+=("$service:$status")
              elif [ "$health" != "healthy" ]; then
                not_ready+=("$service:$health")
              fi
            done

            migrate_id="$(docker compose ps -q migrate)"
            if [ -z "$migrate_id" ]; then
              not_ready+=("migrate:no-container")
            else
              migrate_status="$(docker inspect --format='{{.State.Status}}' "$migrate_id")"
              migrate_exit_code="$(docker inspect --format='{{.State.ExitCode}}' "$migrate_id")"
              if [ "$migrate_status" != "exited" ] || [ "$migrate_exit_code" != "0" ]; then
                not_ready+=("migrate:${migrate_status}:${migrate_exit_code}")
              fi
            fi

            if [ "${#not_ready[@]}" -eq 0 ]; then
              docker compose ps
              exit 0
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              printf 'Timed out waiting for Compose services: %s\n' "${not_ready[*]}" >&2
              docker compose ps >&2
              exit 1
            fi

            printf 'Waiting for Compose services: %s\n' "${not_ready[*]}"
            sleep 10
          done

      - name: Check application health endpoints
        run: |
          set -euo pipefail
          curl --fail --silent --show-error http://localhost:8000/health
          wget -qO- http://localhost:8080/health >/dev/null

      - name: Dump Compose diagnostics
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=200 || true

      - name: Tear down Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans
