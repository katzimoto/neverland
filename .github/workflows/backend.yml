name: Backend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
      - "developer/**"
      - "feature/**"
      - "fix/**"
    paths:
      - "src/**"
      - "tests/**"
      - "migrations/**"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHON_VERSION: "3.13"

jobs:
  quality:
    name: Ruff & mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend dev dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/ migrations/

      - name: Ruff format check
        run: ruff format --check src/ tests/ migrations/

      - name: Mypy strict type check
        run: mypy src --strict

  tests:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install backend dev dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test with coverage
        run: pytest
